# ============================================================================
# Shared Infrastructure Stack (RAGaaS + GoJIRA 공용)
#
# 원칙: "서드파티 기성 이미지(상태 보유) = 이 스택, 자체 빌드 앱 = 각 프로젝트 스택"
# - 앱 스택(RAGaaS, GoJIRA)을 재배포해도 이 스택은 재시작되지 않는다.
# - 앱 컨테이너는 external 네트워크 `shared-net`에 조인하여
#   shared-* 컨테이너 이름으로 접근한다.
# - 개별 서비스 재시작: docker compose restart <service>
#
# 기동:  docker compose up -d   (앱 스택보다 먼저)
# ============================================================================

services:
  # ── 공용 DB ────────────────────────────────────────────────────────────
  mongo:
    # 주의: 기존 데이터 볼륨을 다른 major 버전으로 만든 경우 태그를 맞출 것
    # (WiredTiger 데이터는 major 버전 하위 호환이 없음)
    image: mongo:8.0
    container_name: shared-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-example}
      # init 스크립트에서 사용 (최초 기동 시에만 실행됨)
      RAGAAS_MONGO_PASSWORD: ${RAGAAS_MONGO_PASSWORD:-ragaas-dev-pass}
      GOJIRA_MONGO_PASSWORD: ${GOJIRA_MONGO_PASSWORD:-gojira-dev-pass}
    ports:
      - "27017:27017"
    volumes:
      - shared-mongo-data:/data/db
      - ./init:/docker-entrypoint-initdb.d:ro
    networks:
      - shared-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Milvus (벡터 DB, RAGaaS 사용) ──────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: shared-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - shared-etcd-data:/etcd
    networks:
      - shared-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: shared-minio
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - shared-minio-data:/minio_data
    networks:
      - shared-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: shared-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - shared-milvus-data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    networks:
      - shared-net
    restart: unless-stopped

  # ── Graph DB (RAGaaS 사용) ─────────────────────────────────────────────
  fuseki:
    # TODO: 서드파티 이미지 + 갱신 중단 상태 — 공식 배포판 기반 자체 이미지로 교체 검토.
    # 폐쇄망 반입용으로 latest(=Fuseki 5.1.0)를 5.1.0 태그로 고정함.
    # 로컬에 태그가 없으면: docker tag stain/jena-fuseki:latest stain/jena-fuseki:5.1.0
    image: stain/jena-fuseki:5.1.0
    container_name: shared-fuseki
    environment:
      - ADMIN_PASSWORD=${FUSEKI_ADMIN_PASSWORD:-admin}
      - JVM_ARGS=-Xmx2g
    ports:
      - "3030:3030"
    volumes:
      - shared-fuseki-data:/fuseki
    networks:
      - shared-net
    restart: unless-stopped

  neo4j:
    image: neo4j:5.15.0
    container_name: shared-neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - shared-neo4j-data:/data
      - shared-neo4j-logs:/logs
      - shared-neo4j-import:/var/lib/neo4j/import
      - shared-neo4j-plugins:/plugins
    networks:
      - shared-net
    restart: unless-stopped

  # ── 캐시/큐 (RAGaaS 사용, GoJIRA도 사용 가능) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: shared-redis
    ports:
      - "6379:6379"
    volumes:
      - shared-redis-data:/data
    networks:
      - shared-net
    restart: unless-stopped

  # ── Git 서버 (GoJIRA 사용) ─────────────────────────────────────────────
  # GoJIRA 루트 docker-compose.yml 의 gitea 를 이관 예정 — GoJIRA 측 확인 후 활성화.
  # 기존 gitea-data 볼륨(gojira_gitea-data 등) 승계 필요. docs/shared-infra-handoff.md 참조.
  # gitea:
  #   image: gitea/gitea:latest
  #   container_name: shared-gitea
  #   environment:
  #     - USER_UID=1000
  #     - USER_GID=1000
  #     - GITEA__database__DB_TYPE=sqlite3
  #     - GITEA__server__ROOT_URL=http://localhost:3300/
  #     - GITEA__server__HTTP_PORT=3000
  #     - GITEA__service__DISABLE_REGISTRATION=false
  #     - GITEA__service__REQUIRE_SIGNIN_VIEW=false
  #   ports:
  #     - "3300:3000"
  #   volumes:
  #     - shared-gitea-data:/data
  #   networks:
  #     - shared-net
  #   restart: unless-stopped

volumes:
  shared-mongo-data:
  shared-etcd-data:
  shared-minio-data:
  shared-milvus-data:
  shared-fuseki-data:
  shared-neo4j-data:
  shared-neo4j-logs:
  shared-neo4j-import:
  shared-neo4j-plugins:
  shared-redis-data:
  # shared-gitea-data:

networks:
  shared-net:
    name: shared-net
